<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .hero{
            background:linear-gradient(135deg,#0d6efd,#6610f2);
            color:white;
            padding:50px;
            border-radius:20px;
            text-align:center;
            margin-top:30px;
            margin-bottom:30px;
        }

        .weather-card{
            border:none;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,0,0,0.15);
            transition:0.3s;
        }

        .weather-card:hover{
            transform:translateY(-5px);
        }

    </style>

</head>
<body>

<div class="container">

    <div class="hero">

        <h1>🌦 Weather Dashboard</h1>

        <p>
            Check Weather of Any City
        </p>

    </div>

    <div class="card weather-card p-4">

        <form method="POST">

            <div class="row">

                <div class="col-md-9">

                    <input
                        type="text"
                        name="city"
                        class="form-control"
                        placeholder="Enter City Name"
                        required>

                </div>

                <div class="col-md-3">

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Search

                    </button>

                </div>

            </div>

        </form>

    </div>

    {% if error %}

    <div class="alert alert-danger mt-4">
        {{ error }}
    </div>

    {% endif %}

    {% if weather %}

    <div class="card weather-card mt-4 p-4">

        <h2 class="text-center">
            📍 {{ weather.city }}
        </h2>

        <div class="text-center">

            <img
                src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png"
                alt="Weather Icon">

        </div>

        <hr>

        <div class="row text-center">

            <div class="col-md-4">

                <h4>🌡 Temperature</h4>

                <h2>{{ weather.temp }} °C</h2>

            </div>

            <div class="col-md-4">

                <h4>💧 Humidity</h4>

                <h2>{{ weather.humidity }}%</h2>

            </div>

            <div class="col-md-4">

                <h4>🌬 Wind Speed</h4>

                <h2>{{ weather.wind }} m/s</h2>

            </div>

        </div>

        <hr>

        <h4 class="text-center">
            ☁ {{ weather.description }}
        </h4>

    </div>

    {% endif %}

</div>

</body>
</html>
