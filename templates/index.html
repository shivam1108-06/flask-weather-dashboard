<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .hero{
            background:linear-gradient(135deg,#0d6efd,#6610f2);
            color:white;
            padding:50px;
            border-radius:20px;
            text-align:center;
            margin-top:30px;
            margin-bottom:30px;
        }

        .weather-card{
            border:none;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

    </style>

</head>
<body>

<div class="container">

    <div class="hero">

        <h1>🌦 Weather Dashboard</h1>

        <p>
            Check Weather of Any City
        </p>

    </div>

    <div class="card weather-card p-4">

        <form>

            <div class="row">

                <div class="col-md-9">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Enter City Name">

                </div>

                <div class="col-md-3">

                    <button
                        class="btn btn-primary w-100">

                        Search

                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

</body>
</html>
